<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>sketch</title>
<style>
  * { margin: 0; padding: 0; }
  body { background: #0a0a0a; overflow: hidden; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

canvas.width  = window.innerWidth;
canvas.height = window.innerHeight;

window.addEventListener('resize', () => {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
});

const COUNT = 300;
let t = 0;

let particles = Array.from({ length: COUNT }, () => ({
  x: Math.random() * canvas.width,
  y: Math.random() * canvas.height,
  age: Math.random() * 200,
}));

function noise(x, y, t) {
  return (
    Math.sin(x * 1.7 + t) * Math.cos(y * 1.3 - t * 0.7) +
    Math.sin(x * 0.9 - y * 1.1 + t * 1.3) * 0.5 +
    Math.cos(x * 2.3 + y * 0.8 - t * 0.9) * 0.25
  ) / 1.75;
}

function draw() {
  t += 0.0004;

  ctx.fillStyle = 'rgba(10,10,10,0.015)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  for (const p of particles) {
    const angle = noise(p.x * 0.003, p.y * 0.003, t) * Math.PI * 2;
    p.x += Math.cos(angle) * 1.8;
    p.y += Math.sin(angle) * 1.8;
    p.age++;

    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.fillRect(p.x, p.y, 1.5, 1.5);

    if (p.x < 0 || p.x > canvas.width || p.y < 0 || p.y > canvas.height || p.age > 300) {
      p.x = Math.random() * canvas.width;
      p.y = Math.random() * canvas.height;
      p.age = 0;
    }
  }

  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
