<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>sketch</title>

<style>
*{margin:0;padding:0}
body{background:#050505;overflow:hidden;font-family:monospace}
canvas{display:block;cursor:crosshair}

#hint{
position:fixed;
bottom:20px;
left:24px;
color:#444;
font-size:11px;
line-height:1.8;
pointer-events:none;
transition:opacity 1s
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<div id="hint">
space — pause<br>
r — new palette<br>
c — clear<br>
click — burst
</div>

<script>

const canvas = document.getElementById("c")
const ctx = canvas.getContext("2d")
const hint = document.getElementById("hint")

function resize(){
canvas.width = innerWidth
canvas.height = innerHeight
}
resize()
addEventListener("resize",resize)

setTimeout(()=>hint.style.opacity=0,4000)

const COUNT = Math.floor((innerWidth*innerHeight)/1500)

let t=0
let mx=canvas.width/2
let my=canvas.height/2
let paused=false

function randomPalette(){
const base=Math.random()*360
return [
[base,70],
[(base+40)%360,70],
[(base+200)%360,60],
[(base+320)%360,65]
]
}

let palette=randomPalette()

let particles=Array.from({length:COUNT},()=>({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
age:Math.random()*300,
size:Math.random()*1.6+0.3
}))

canvas.addEventListener("mousemove",e=>{
mx=e.clientX
my=e.clientY
})

canvas.addEventListener("click",e=>{
for(let i=0;i<120;i++){
const idx=Math.floor(Math.random()*particles.length)
particles[idx]={x:e.clientX,y:e.clientY,age:0,size:Math.random()*2}
}
})

addEventListener("keydown",e=>{
if(e.key===" ") paused=!paused
if(e.key==="c"){
ctx.globalCompositeOperation="source-over"
ctx.fillStyle="#050505"
ctx.fillRect(0,0,canvas.width,canvas.height)
ctx.globalCompositeOperation="lighter"
}
if(e.key==="r") palette=randomPalette()
})

function noise(x,y,t){
return(
Math.sin(x*1.7+t)*Math.cos(y*1.3-t*0.7)+
Math.sin(x*0.9-y*1.1+t*1.3)*0.5+
Math.cos(x*2.3+y*0.8-t*0.9)*0.25
)/1.75
}

ctx.globalCompositeOperation="lighter"

function draw(){

if(!paused){

t+=0.0004

ctx.fillStyle="rgba(5,5,5,0.03)"
ctx.fillRect(0,0,canvas.width,canvas.height)

for(let i=0;i<particles.length;i++){

const p=particles[i]

const angle=noise(p.x*0.003,p.y*0.003,t)*Math.PI*2

const dx=mx-p.x
const dy=my-p.y
const dist=Math.sqrt(dx*dx+dy*dy)||1
const pull=Math.max(0,1-dist/500)*2

p.x+=Math.cos(angle)*1.7+(dx/dist)*pull*1.5
p.y+=Math.sin(angle)*1.7+(dy/dist)*pull*1.5

p.age++

const [h,s]=palette[i%palette.length]
const l=50+25*Math.sin(p.age*0.03)

ctx.fillStyle=`hsla(${h},${s}%,${l}%,0.9)`

ctx.beginPath()
ctx.arc(p.x,p.y,p.size,0,Math.PI*2)
ctx.fill()

if(
p.x<0||p.x>canvas.width||
p.y<0||p.y>canvas.height||
p.age>500
){
particles[i]={
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
age:0,
size:Math.random()*1.6+0.3
}
}

}

}

requestAnimationFrame(draw)
}

draw()

</script>

</body>
</html>
