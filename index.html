<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>sketch</title>
<style>
  * { margin: 0; padding: 0; }
  body { background: #0a0a0a; overflow: hidden; font-family: monospace; }
  canvas { cursor: crosshair; display: block; }
  #hint {
    position: fixed;
    bottom: 20px;
    left: 24px;
    color: #333;
    font-size: 11px;
    line-height: 1.8;
    pointer-events: none;
    transition: opacity 1s;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">
  space — pause<br>
  r — new color<br>
  c — clear<br>
  click — burst
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const hint = document.getElementById('hint');

canvas.width  = window.innerWidth;
canvas.height = window.innerHeight;

window.addEventListener('resize', () => {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
});

// fade hint out after 4s
setTimeout(() => hint.style.opacity = '0', 4000);

const COUNT = 600;
let t = 0;
let mx = canvas.width / 2;
let my = canvas.height / 2;
let paused = false;

function randomPalette() {
  const h = Math.random() * 360;
  return [[h, 70], [(h + 40) % 360, 60], [(h + 180) % 360, 55]];
}

let palette = randomPalette();

let particles = Array.from({ length: COUNT }, () => ({
  x: Math.random() * canvas.width,
  y: Math.random() * canvas.height,
  age: Math.random() * 200,
}));

canvas.addEventListener('mousemove', e => {
  mx = e.clientX;
  my = e.clientY;
});

canvas.addEventListener('click', e => {
  for (let i = 0; i < 80; i++) {
    const idx = Math.floor(Math.random() * COUNT);
    particles[idx] = { x: e.clientX, y: e.clientY, age: 0 };
  }
});

window.addEventListener('keydown', e => {
  if (e.key === ' ')  paused = !paused;
  if (e.key === 'c')  { ctx.fillStyle = '#0a0a0a'; ctx.fillRect(0, 0, canvas.width, canvas.height); }
  if (e.key === 'r')  palette = randomPalette();
});

function noise(x, y, t) {
  return (
    Math.sin(x * 1.7 + t) * Math.cos(y * 1.3 - t * 0.7) +
    Math.sin(x * 0.9 - y * 1.1 + t * 1.3) * 0.5 +
    Math.cos(x * 2.3 + y * 0.8 - t * 0.9) * 0.25
  ) / 1.75;
}

function draw() {
  if (!paused) {
    t += 0.0004;

    ctx.fillStyle = 'rgba(10,10,10,0.008)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    for (let i = 0; i < particles.length; i++) {
      const p = particles[i];
      const angle = noise(p.x * 0.003, p.y * 0.003, t) * Math.PI * 2;

      const dx = mx - p.x;
      const dy = my - p.y;
      const dist = Math.sqrt(dx * dx + dy * dy) || 1;
      const pull = Math.max(0, 1 - dist / 500) * 2.5;

      p.x += Math.cos(angle) * 1.8 + (dx / dist) * pull * 1.8;
      p.y += Math.sin(angle) * 1.8 + (dy / dist) * pull * 1.8;
      p.age++;

      const [h, s] = palette[i % palette.length];
      const l = 45 + 25 * Math.sin(p.age * 0.04);
      ctx.fillStyle = `hsla(${h}, ${s}%, ${l}%, 0.8)`;
      ctx.fillRect(p.x, p.y, 1.5, 1.5);

      if (p.x < 0 || p.x > canvas.width || p.y < 0 || p.y > canvas.height || p.age > 400) {
        particles[i] = { x: Math.random() * canvas.width, y: Math.random() * canvas.height, age: 0 };
      }
    }
  }

  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
